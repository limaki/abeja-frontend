<section class="carousel">
  <div
    class="carousel__slide"
    [style.background-image]="'linear-gradient(90deg, rgba(0,0,0,0.45), rgba(0,0,0,0.20)), url(' + slides[currentIndex].image + ')'"
    (mouseenter)="stopAutoSlide()"
    (mouseleave)="startAutoSlide()"
  >
    <div class="carousel__content">
      <span class="carousel__badge">Abeja Store</span>

      <h1 class="carousel__title">
        {{ slides[currentIndex].title }}
      </h1>

      <p class="carousel__subtitle">
        {{ slides[currentIndex].subtitle }}
      </p>

      <a class="carousel__button" [routerLink]="slides[currentIndex].buttonLink">
        {{ slides[currentIndex].buttonText }}
      </a>
    </div>

    <button class="carousel__arrow carousel__arrow--left" type="button" (click)="prev(); startAutoSlide()">
      ‹
    </button>

    <button class="carousel__arrow carousel__arrow--right" type="button" (click)="next(); startAutoSlide()">
      ›
    </button>
  </div>

  <div class="carousel__dots">
    <button
      type="button"
      class="carousel__dot"
      *ngFor="let slide of slides; let i = index"
      [class.carousel__dot--active]="i === currentIndex"
      (click)="goToSlide(i)"
      [attr.aria-label]="'Ir al slide ' + (i + 1)">
    </button>
  </div>
</section>
