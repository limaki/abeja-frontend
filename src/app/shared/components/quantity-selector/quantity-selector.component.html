<div class="quantity-selector">
  <button
    type="button"
    class="quantity-selector__btn"
    (click)="decrease()"
    [disabled]="quantity <= min">
    −
  </button>

  <span class="quantity-selector__value">
    {{ quantity }}
  </span>

  <button
    type="button"
    class="quantity-selector__btn"
    (click)="increase()"
    [disabled]="quantity >= max">
    +
  </button>
</div>
